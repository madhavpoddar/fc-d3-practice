<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 255" width="600" height="255"
     font-family="Manrope, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#1f2540"/>
    </marker>
  </defs>

  <rect width="600" height="255" fill="#f5f6fa" rx="10"/>

  <!-- Axes -->
  <line x1="112" y1="44" x2="560" y2="44" stroke="#1f2540" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="112" y1="44" x2="112" y2="228" stroke="#1f2540" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Origin corner bracket -->
  <polyline points="125,44 125,31 112,31" fill="none" stroke="#1f2540" stroke-width="1.5"/>

  <!-- Rectangle (bar) -->
  <rect x="188" y="100" width="272" height="108" fill="#2b3a55" rx="2"/>
  <text x="324" y="162" text-anchor="middle" fill="white" font-size="15" font-weight="600" letter-spacing="0.02em">rect</text>

  <!-- x dimension -->
  <line x1="112" y1="152" x2="188" y2="152" stroke="#8089a8" stroke-width="1.2"/>
  <line x1="112" y1="146" x2="112" y2="158" stroke="#8089a8" stroke-width="1.2"/>
  <line x1="188" y1="146" x2="188" y2="158" stroke="#8089a8" stroke-width="1.2"/>
  <text x="150" y="169" text-anchor="middle" fill="#4a5170" font-size="13">x</text>

  <!-- y dimension -->
  <line x1="181" y1="44" x2="181" y2="100" stroke="#8089a8" stroke-width="1.2"/>
  <line x1="175" y1="44"  x2="187" y2="44"  stroke="#8089a8" stroke-width="1.2"/>
  <line x1="175" y1="100" x2="187" y2="100" stroke="#8089a8" stroke-width="1.2"/>
  <text x="199" y="77" text-anchor="start" fill="#4a5170" font-size="13">y</text>

  <!-- width dimension -->
  <line x1="188" y1="224" x2="460" y2="224" stroke="#8089a8" stroke-width="1.2"/>
  <line x1="188" y1="218" x2="188" y2="230" stroke="#8089a8" stroke-width="1.2"/>
  <line x1="460" y1="218" x2="460" y2="230" stroke="#8089a8" stroke-width="1.2"/>
  <text x="324" y="243" text-anchor="middle" fill="#4a5170" font-size="13">width</text>

  <!-- height dimension -->
  <line x1="478" y1="100" x2="478" y2="208" stroke="#8089a8" stroke-width="1.2"/>
  <line x1="472" y1="100" x2="484" y2="100" stroke="#8089a8" stroke-width="1.2"/>
  <line x1="472" y1="208" x2="484" y2="208" stroke="#8089a8" stroke-width="1.2"/>
  <text x="493" y="158" text-anchor="start" fill="#4a5170" font-size="13">height</text>

  <!-- Axis labels -->
  <text x="10" y="28" fill="#1f2540" font-size="12" font-weight="600">Origin (0, 0)</text>
  <text x="500" y="30" text-anchor="middle" fill="#4a5170" font-size="12">x-axis →</text>
  <text x="55" y="195" text-anchor="middle" fill="#4a5170" font-size="12">↓ y-axis</text>
</svg>
